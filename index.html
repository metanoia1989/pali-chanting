<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pāli Chant · 巴利语唱诵精听</title>
  <meta name="description" content="巴利语唱诵精听与发音学习工具 — 单词级精准高亮、循环精听、离线可用">
  <meta name="theme-color" content="#f5f0e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.svg">
  <link rel="stylesheet" href="/src/css/common.css">
  <link rel="stylesheet" href="/src/css/play.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside class="sidebar" :class="{ open: sidebarOpen }">
    <div class="sidebar-header">
      Pāli <em>Chant</em>
      <small>巴利语唱诵精听</small>
    </div>
    <div class="track-list">
      <div v-for="t in tracks"
           :key="t.id"
           class="track-item"
           :class="{ active: current?.id === t.id }"
           @click="selectTrack(t)">
        <span class="num">{{ t.id }}</span>
        <span class="track-name">{{ t.name }}</span>
        <span class="track-status" :class="t.hasJson ? 'ok' : 'na'">
          {{ t.hasJson ? '高亮' : '暂无' }}
        </span>
      </div>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile only) -->
  <div class="sidebar-overlay" :class="{ open: sidebarOpen }" @click="sidebarOpen = false"></div>

  <!-- Main -->
  <main class="main">
    <div class="mobile-header">
      <button class="menu-btn" @click="toggleSidebar" aria-label="打开菜单">☰</button>
      <span class="mobile-title">Pāli Chant</span>
    </div>

    <div v-if="!current" class="empty-state">
      <div class="icon">🎧</div>
      <p>选择一个唱诵开始精听</p>
      <button class="btn-random" @click="randomTrack">🎲 随机播放</button>
    </div>

    <template v-else>
      <div class="track-title">{{ current.name }}</div>
      <div class="track-meta">{{ current.id }} · {{ current.hasJson ? '单词级高亮' : '暂无时间戳标注' }}</div>

      <!-- Banner -->
      <div v-if="!current.hasJson" class="banner banner-info">
        <span>ℹ️</span>
        <span>此音频暂无高亮 — 时间戳尚未处理完成，仍可正常播放。</span>
      </div>

      <!-- Player -->
      <div class="player">
        <button class="btn-play" @click="togglePlay" :disabled="!audioReady">
          {{ playing ? '⏸' : '▶' }}
        </button>
        <div class="progress-wrap">
          <div class="progress-bar" ref="progressBar" @click="seek">
            <div class="progress-fill" :style="{ width: progressPct + '%' }"></div>
          </div>
          <span class="time">{{ fmtTime(currentTime) }} / {{ fmtTime(duration) }}</span>
        </div>
      </div>

      <!-- Text: original Pali text with sub-word synced highlights -->
      <div class="text-area" ref="textAreaEl">
        <template v-if="paragraphs.length">
          <div v-for="(p, pi) in paragraphs" :key="pi" class="paragraph">
            <div v-for="(line, li) in p.lines" :key="li" class="line">
              <span v-for="(t, ti) in line.tokens" :key="ti" style="display: inline;">
                <template v-for="(part, pi2) in t.parts">
                  <span v-if="part.start !== undefined"
                        class="word"
                        :data-start="part.start"
                        :class="[current.hasJson ? partClass(part) : '', current.hasJson ? 'clickable' : '']"
                        @click="current.hasJson && seekTo(part.start)">
                    {{ part.text }}
                  </span>
                  <span v-else class="part-sep">{{ part.text }}</span>
                </template>
                <span v-if="ti < line.tokens.length - 1"> </span>
              </span>
            </div>
          </div>
        </template>
        <div v-else style="color: var(--muted); font-size: 0.95rem; text-align: center; margin-top: 40px;">
          暂无经文文本
        </div>
      </div>
    </template>
  </main>

</div>

<script type="module" src="/src/js/play.js"></script>
</body>
</html>
