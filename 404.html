<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Pāli Chant</title>
  <link rel="stylesheet" href="/src/css/common.css">
  <style>
    .hero-404 h1 { font-size: clamp(5rem, 12vw, 8rem); margin-bottom: 4px; }
    .hero-404 h2 {
      font-size: clamp(1.1rem, 2vw, 1.3rem);
      font-weight: 400; color: var(--ink-light); max-width: 460px;
      margin-bottom: 12px;
    }
    .hero-404 .pali {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }
    .hero-404 .pali-sub {
      font-size: 0.88rem; color: var(--muted); margin-bottom: 32px;
    }
  </style>
</head>
<body>

<nav>
  <div class="inner">
    <a href="/" class="logo">Pāli <em>Chant</em></a>
    <div class="links">
      <a href="/#features">功能</a>
      <a href="/#tech">技术栈</a>
      <a href="/#users">适用人群</a>
    </div>
  </div>
</nav>

<header class="hero hero-404">
  <span class="hero-badge">404 · Naṭṭha</span>
  <div class="pali">Natthi idaṃ</div>
  <h1>404</h1>
  <h2>你所寻找的页面不在此处<br>如同踪迹消失在风中</h2>
  <p class="pali-sub">Natthi — 巴利语「无有」、「不存在」</p>
  <div class="actions">
    <a href="/" class="btn btn-primary">返回首页</a>
  </div>
</header>

<footer>
  <p>Pāli Chant · 巴利语唱诵精听与发音学习工具</p>
  <p style="margin-top: 4px;">以 MIT 协议开源 · 构建于 <a href="#">GitHub</a></p>
</footer>

</body>
</html>
