<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pāli Chant · 唱诵精听演示</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="./assets/css/common.css">
  <link rel="stylesheet" href="./assets/css/play.css">
</head>
<body>
<div id="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      Pāli <em>Chant</em>
      <small>唱诵精听演示</small>
    </div>
    <div class="track-list">
      <div v-for="t in tracks"
           :key="t.id"
           class="track-item"
           :class="{ active: current?.id === t.id }"
           @click="selectTrack(t)">
        <span class="num">{{ t.id }}</span>
        <span class="track-name">{{ t.name }}</span>
        <span class="track-status" :class="t.hasJson ? 'ok' : 'na'">
          {{ t.hasJson ? '高亮' : '暂无' }}
        </span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">
    <div v-if="!current" class="empty-state">
      <div class="icon">🎧</div>
      <p>从左侧选择一个唱诵开始精听</p>
    </div>

    <template v-else>
      <div class="track-title">{{ current.name }}</div>
      <div class="track-meta">{{ current.id }} · {{ current.hasJson ? '单词级高亮' : '暂无时间戳标注' }}</div>

      <!-- Banner -->
      <div v-if="!current.hasJson" class="banner banner-info">
        <span>ℹ️</span>
        <span>此音频暂无高亮 — 时间戳尚未处理完成，仍可正常播放。</span>
      </div>

      <!-- Player -->
      <div class="player">
        <button class="btn-play" @click="togglePlay" :disabled="!audioReady">
          {{ playing ? '⏸' : '▶' }}
        </button>
        <div class="progress-wrap">
          <div class="progress-bar" ref="progressBar" @click="seek">
            <div class="progress-fill" :style="{ width: progressPct + '%' }"></div>
          </div>
          <span class="time">{{ fmtTime(currentTime) }} / {{ fmtTime(duration) }}</span>
        </div>
      </div>

      <!-- Text: original Pali text with sub-word synced highlights -->
      <div class="text-area" ref="textAreaEl">
        <template v-if="paragraphs.length">
          <div v-for="(p, pi) in paragraphs" :key="pi" class="paragraph">
            <div v-for="(line, li) in p.lines" :key="li" class="line">
              <span v-for="(t, ti) in line.tokens" :key="ti" style="display: inline;">
                <template v-for="(part, pi2) in t.parts">
                  <span v-if="part.start !== undefined"
                        class="word"
                        :class="[current.hasJson ? partClass(part) : '', current.hasJson ? 'clickable' : '']"
                        :ref="el => { if (el && current.hasJson && part.start <= currentTime.value && currentTime.value < part.end) activeWordEl = el }"
                        @click="current.hasJson && seekTo(part.start)">
                    {{ part.text }}
                  </span>
                  <span v-else class="part-sep">{{ part.text }}</span>
                </template>
                <span v-if="ti < line.tokens.length - 1"> </span>
              </span>
            </div>
          </div>
        </template>
        <div v-else style="color: var(--muted); font-size: 0.95rem; text-align: center; margin-top: 40px;">
          暂无经文文本
        </div>
      </div>
    </template>
  </main>

</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, nextTick } = Vue;

// ─── Pali lexicon regex (mirrors generate_csv.py) ───
const PALI_RE = /[a-zA-ZāĀīĪūŪṃṀṁṅṄñÑṭṬḍḌṇṆḷḶ'’]+/g;
function cleanWord(w) { return (w.match(PALI_RE) || []).join(''); }

// ─── Track definitions ───
const tracks = [
  { id: '01', name: 'Homage Tisarana · 礼敬佛陀 三皈依',
    audio: '01.Homage Tisarana 礼敬佛陀 三皈依.mp3',
    json: '01.Homage Tisarana 礼敬佛陀 三皈依.json', hasJson: true },
  { id: '02', name: 'Main Puja · 佛随念 礼敬七佛',
    audio: '02.Main Puja 佛随念 礼敬七佛.mp3',
    json: null, hasJson: false },
  { id: '03', name: 'Inviting the Devas · 邀请诸天',
    audio: '03.inviting the Devas 邀请诸天.mp3',
    json: null, hasJson: false },
  { id: '04', name: 'Maha Maṅgala Sutta · 大吉祥经',
    audio: '04.Maha Maṅgala Suttaṁ 大吉祥经.mp3',
    json: null, hasJson: false },
  { id: '05', name: 'Ratana Suttam · 珍宝经',
    audio: '05.Ratana Suttam 珍宝经.mp3',
    json: null, hasJson: false },
  { id: '06', name: 'Karaṇīya Metta Sutta · 应行慈爱经',
    audio: '06.Karaniya metta Sutta 应行慈爱经.mp3',
    json: null, hasJson: false },
  { id: '07', name: 'Kammā Vācanā · 请求宽恕',
    audio: '07.Kammā Vācanā  请求宽恕.mp3',
    json: null, hasJson: false },
];

// ─── Parse original Pali text into paragraph/line/token structure ───
function parsePaliText(text) {
  const paragraphs = [];
  const rawParas = text.split(/\n\n+/);
  for (const rawP of rawParas) {
    const lines = [];
    const rawLines = rawP.trim().split('\n');
    for (const rawL of rawLines) {
      let l = rawL.trim();
      if (!l || l.startsWith('//')) continue;
      l = l.replace(/^\d+\.[\s\t]*/, '').replace(/^\d+[\s\t]/, '').replace(/\/\/.*$/, '').trim();
      if (!l) continue;
      const tokens = l.split(/\s+/).map(d => ({ display: d, parts: [] }));
      lines.push({ tokens });
    }
    if (lines.length) paragraphs.push({ lines });
  }
  return paragraphs;
}

// ─── Align tokens with JSON words by position ───
// Builds token.parts: an array of {text, start?, end?}.
// Hyphenated compounds get multiple timed parts with "-" separators between them.
function alignWithJson(paragraphs, jsonWords) {
  let ji = 0;
  for (const p of paragraphs) {
    for (const line of p.lines) {
      for (const token of line.tokens) {
        const rawParts = token.display.split('-');
        const parts = [];
        for (let i = 0; i < rawParts.length; i++) {
          const segment = rawParts[i];
          if (i > 0) parts.push({ text: '-' });
          const cleaned = cleanWord(segment);
          if (cleaned) {
            const jw = jsonWords[ji];
            if (jw) {
              parts.push({
                text: segment,
                start: parseFloat(jw.start_time),
                end: parseFloat(jw.end_time),
              });
              ji++;
            } else {
              parts.push({ text: segment });
            }
          } else {
            parts.push({ text: segment });
          }
        }
        token.parts = parts;
      }
    }
  }
}

// ─── Flat list of all timed parts for efficient scanning ───
function flattenParts(paragraphs) {
  const all = [];
  for (const p of paragraphs) {
    for (const line of p.lines) {
      for (const token of line.tokens) {
        for (const part of token.parts) {
          if (part.start !== undefined) all.push(part);
        }
      }
    }
  }
  return all;
}

// ─── App ───
createApp({
  setup() {
    const current = ref(null);
    const playing = ref(false);
    const audioReady = ref(false);
    const currentTime = ref(0);
    const duration = ref(0);
    const paragraphs = ref([]);
    const flatParts = ref([]);
    const progressBar = ref(null);
    const textAreaEl = ref(null);
    const activeWordEl = ref(null);

    let audio = null;
    let rafId = null;

    const progressPct = computed(() => {
      if (!duration.value) return 0;
      return (currentTime.value / duration.value) * 100;
    });

    function partClass(part) {
      if (part.start === undefined) return '';
      if (part.end <= currentTime.value) return 'dim';
      if (part.start <= currentTime.value && part.end > currentTime.value) return 'active';
      return '';
    }

    function fmtTime(t) {
      if (!t || isNaN(t)) return '00:00';
      const m = Math.floor(t / 60);
      const s = Math.floor(t % 60);
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function initAudio(src) {
      if (audio) {
        audio.pause();
        audio.src = '';
        cancelAnimationFrame(rafId);
        playing.value = false;
        audioReady.value = false;
      }
      audio = new Audio(src);
      audio.preload = 'auto';

      audio.addEventListener('loadedmetadata', () => {
        duration.value = audio.duration || 0;
        audioReady.value = true;
      });
      audio.addEventListener('play', () => { playing.value = true; startSync(); });
      audio.addEventListener('pause', () => { playing.value = false; stopSync(); });
      audio.addEventListener('ended', () => {
        playing.value = false;
        currentTime.value = duration.value;
        stopSync();
      });
      audio.addEventListener('timeupdate', () => {
        currentTime.value = audio.currentTime;
      });
    }

    function startSync() {
      stopSync();
      function tick() {
        if (audio && !audio.paused) currentTime.value = audio.currentTime;
        rafId = requestAnimationFrame(tick);
      }
      rafId = requestAnimationFrame(tick);
    }

    function stopSync() {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    }

    async function selectTrack(track) {
      if (current.value && current.value.id === track.id) return;
      current.value = track;
      paragraphs.value = [];
      flatParts.value = [];

      // 1. Fetch original Pali text
      let rawText = '';
      try {
        const txtName = track.audio.replace('.mp3', '.txt');
        const resp = await fetch('./assets/pali/' + txtName);
        if (resp.ok) rawText = await resp.text();
      } catch (e) {}

      // 2. Parse into paragraphs/lines/tokens
      const parsed = parsePaliText(rawText || '');

      // 3. If JSON exists, fetch and align
      if (track.hasJson) {
        try {
          const resp = await fetch('./assets/json/' + track.json);
          if (resp.ok) {
            const data = await resp.json();
            alignWithJson(parsed, data);
          }
        } catch (e) { console.warn('JSON load failed:', e); }
      }

      paragraphs.value = parsed;
      flatParts.value = flattenParts(parsed);

      initAudio('./assets/audio/' + track.audio);
    }

    function togglePlay() {
      if (!audio || !audioReady.value) return;
      if (audio.paused) audio.play().catch(() => {});
      else audio.pause();
    }

    function seek(e) {
      if (!audio || !duration.value) return;
      const rect = progressBar.value.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      audio.currentTime = pct * duration.value;
    }

    function seekTo(time) {
      if (!time || !audio) return;
      audio.currentTime = time;
      if (audio.paused) audio.play().catch(() => {});
    }

    // ─── Scroll active part into view ───
    let lastActiveEl = null;
    function scrollActive() {
      nextTick(() => {
        const el = activeWordEl.value;
        if (el && el !== lastActiveEl && textAreaEl.value) {
          lastActiveEl = el;
          const cr = textAreaEl.value.getBoundingClientRect();
          const er = el.getBoundingClientRect();
          if (er.top < cr.top + 80 || er.bottom > cr.bottom - 40) {
            el.scrollIntoView({ block: 'center', behavior: 'smooth' });
          }
        }
      });
    }

    // ─── Poll active-part changes ───
    onMounted(() => {
      let lastIdx = -1;
      setInterval(() => {
        if (!current.value?.hasJson || !flatParts.value.length) return;
        const fp = flatParts.value;
        let idx = 0;
        for (const p of fp) {
          if (p.start <= currentTime.value && p.end > currentTime.value) break;
          idx++;
        }
        if (idx < fp.length && idx !== lastIdx) { lastIdx = idx; scrollActive(); }
      }, 250);
    });

    // ─── Keyboard ───
    function onKey(e) {
      if (e.code === 'Space' && current.value) { e.preventDefault(); togglePlay(); }
    }
    document.addEventListener('keydown', onKey);
    onUnmounted(() => {
      document.removeEventListener('keydown', onKey);
      if (audio) { audio.pause(); audio.src = ''; }
      stopSync();
    });

    return {
      tracks, current, playing, audioReady,
      currentTime, duration, paragraphs, flatParts,
      progressPct, progressBar, textAreaEl, activeWordEl,
      selectTrack, togglePlay, seek, seekTo,
      partClass, fmtTime,
    };
  }
}).mount('#app');
</script>
</body>
</html>
